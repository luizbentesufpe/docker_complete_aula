name: Frontend CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - "front_end/**"
      - ".github/workflows/frontend-ci.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_FRONT: ghcr.io/${{ github.repository_owner }}/aula_front_web

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Define tags
        id: vars
        run: |
          echo "SHA_TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "DATE_TAG=$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./front_end/aula_front_web
          file: ./front_end/aula_front_web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_FRONT }}:latest
            ${{ env.IMAGE_FRONT }}:${{ steps.vars.outputs.SHA_TAG }}
            ${{ env.IMAGE_FRONT }}:${{ steps.vars.outputs.DATE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Opção B (determinística): Deploy por SSH só do frontend
  deploy:
    if: ${{ github.ref == 'refs/heads/main' }}
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH (pull/up apenas do frontend)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /caminho/do/seu/projeto
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            docker compose -f docker-compose.prod.yml pull frontend
            docker compose -f docker-compose.prod.yml up -d frontend
            docker image prune -f